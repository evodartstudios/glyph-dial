name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'   # Trigger on version tags: v1.0.0, v2.1.3, etc.
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-release:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      # ── Java Setup ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # ── Gradle Cache ─────────────────────────────────────────────────────────
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── Decode Keystore ───────────────────────────────────────────────────────
      # The keystore is stored as a base64-encoded GitHub secret (KEYSTORE_BASE64).
      # We decode it here to a temp file and pass its path to Gradle via KEYSTORE_PATH.
      - name: Decode release keystore
        run: |
          mkdir -p $HOME/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $HOME/keystore/release.jks
          echo "KEYSTORE_PATH=$HOME/keystore/release.jks" >> $GITHUB_ENV

      # ── Build Release APK ─────────────────────────────────────────────────────
      # KEYSTORE_PATH is now set in $GITHUB_ENV (available to this step).
      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      # ── Rename APK ───────────────────────────────────────────────────────────
      - name: Rename APK for release
        run: |
          TAG="${{ github.ref_name }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.event.inputs.tag_name }}"
          fi
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/app-release.apk \
             release-artifacts/GlyphDial-${TAG}.apk

      # ── Verify APK signature ─────────────────────────────────────────────────
      - name: Verify APK is signed
        run: |
          $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | tail -1)/apksigner \
            verify --print-certs release-artifacts/*.apk

      # ── Upload APK as artifact ────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlyphDial-release-apk
          path: release-artifacts/*.apk
          retention-days: 30

      # ── Create GitHub Release ─────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag_name }}
          name: "GlyphDial ${{ github.ref_name || github.event.inputs.tag_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: release-artifacts/*.apk
          generate_release_notes: true
          body: |
            ## Installation
            
            1. Download the APK file below
            2. On your Android device, go to **Settings → Apps → Special app access → Install unknown apps**
            3. Enable installation for your file manager or browser
            4. Open the downloaded APK and follow the prompts
            
            > **Note**: This APK is signed with the EvoDart release key. You may need to uninstall any debug/development version first.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
