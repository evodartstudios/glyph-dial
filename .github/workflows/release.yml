name: Build & Release APK

on:
  push:
    tags:
      - 'v*.*.*'          # triggers on tags like v1.0.0, v1.2.3
  workflow_dispatch:       # allows manual trigger from Actions tab

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create GitHub Releases and upload assets


    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ────────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Gradle permissions ──────────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Build APK ───────────────────────────────────────────────────────────
      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        # NOTE: This produces an unsigned/debug-signed APK.
        # To sign with a keystore, add KEYSTORE secrets and use
        # the signing config block in build.gradle.kts.

      # ── Locate the APK ──────────────────────────────────────────────────────
      - name: Find APK path
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          # Rename to a friendly name: GlyphDial-v1.0.0.apk
          TAG=${GITHUB_REF_NAME:-manual}
          FRIENDLY="GlyphDial-${TAG}.apk"
          cp "$APK_PATH" "$FRIENDLY"
          echo "friendly=$FRIENDLY" >> $GITHUB_OUTPUT

      # ── Create GitHub Release & upload APK ──────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Glyph Dial ${{ github.ref_name }}"
          body: |
            ## 📱 Glyph Dial ${{ github.ref_name }}

            **Direct download for non-developers** — no Android Studio required.

            ### Install Instructions
            1. Download `GlyphDial-${{ github.ref_name }}.apk` below
            2. On your Android device, go to **Settings → Security → Install unknown apps** and allow your browser/file manager
            3. Open the downloaded APK and tap **Install**
            4. On first launch, set Glyph Dial as your **Default Phone App** when prompted

            > ⚠️ Minimum Android 8.0 (API 26) required.

            ---
            *Built automatically from source by GitHub Actions.*
          files: ${{ steps.apk.outputs.friendly }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
